concurrent = ${RUNNER_GPU_CONCURRENCY}
check_interval = 0
shutdown_timeout = 0

[session_server]
  session_timeout = 1800

[[runners]]
  name = "${RUNNER_DESCRIPTION_PREFIX}-gpu"
  url = "${GITLAB_URL}"
  token = "REGISTERED_BY_SCRIPT"
  executor = "${RUNNER_EXECUTOR}"
  environment = [
    "NVIDIA_VISIBLE_DEVICES=all",
    "NVIDIA_DRIVER_CAPABILITIES=compute,utility"
  ]
  request_concurrency = ${RUNNER_GPU_CONCURRENCY}
  [runners.cache]
    MaxUploadedArchiveSize = 0
  [runners.docker]
    tls_verify = false
    image = "${RUNNER_DOCKER_IMAGE}"
    privileged = false
    disable_entrypoint_overwrite = false
    oom_kill_disable = false
    disable_cache = false
    volumes = ["/cache", "/var/run/docker.sock:/var/run/docker.sock"]
    shm_size = 0
    pull_policy = "if-not-present"
    runtime = "nvidia"
    gpus = "all"
