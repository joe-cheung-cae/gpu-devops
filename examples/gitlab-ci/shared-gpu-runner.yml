stages:
  - verify
  - build

default:
  image: tf-particles/devops/cuda-builder:cuda11.7-cmake3.26-centos7
  tags:
    - gpu
    - cuda
    - cuda-11

# Change the image tag suffix to `rocky8` or `ubuntu2204` if your project
# requires one of the other published builder variants.

gpu-smoke:
  stage: verify
  script:
    - nvidia-smi
    - nvcc --version
    - cmake --version

cuda-cmake-build:
  stage: build
  script:
    - cmake -S examples/cuda-smoke -B build -G Ninja
    - cmake --build build

multi-gpu-smoke:
  stage: verify
  tags:
    - gpu-multi
    - cuda
    - cuda-11
  variables:
    GPU_COUNT: "2"
  script:
    - echo "Requested GPU count: ${GPU_COUNT}"
    - nvidia-smi
