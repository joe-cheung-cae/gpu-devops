stages:
  - verify
  - build

default:
  image: registry.example.com/devops/cuda-builder:cuda11.7-cmake3.26-centos7
  tags:
    - gpu
    - cuda
    - cuda-11

gpu-smoke:
  stage: verify
  script:
    - nvidia-smi
    - nvcc --version
    - cmake --version

cuda-cmake-build:
  stage: build
  script:
    - cmake -S examples/cuda-smoke -B build -G Ninja
    - cmake --build build

multi-gpu-smoke:
  stage: verify
  tags:
    - gpu-multi
    - cuda
    - cuda-11
  variables:
    GPU_COUNT: "2"
  script:
    - echo "Requested GPU count: ${GPU_COUNT}"
    - nvidia-smi
