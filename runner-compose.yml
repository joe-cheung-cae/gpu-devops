services:
  gitlab-runner:
    image: ${RUNNER_SERVICE_IMAGE:-gitlab/gitlab-runner:alpine-v16.10.1}
    container_name: ${RUNNER_CONTAINER_NAME:-gitlab-runner-devops-docker}
    restart: unless-stopped
    environment:
      RUNNER_CONFIG_DIR: /etc/gitlab-runner
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./runner/config:/etc/gitlab-runner
      - ./runner/cache:/cache
    healthcheck:
      test: ["CMD-SHELL", "gitlab-runner --version >/dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
