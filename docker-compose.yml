services:
  cuda-cxx-centos7:
    image: ${BUILDER_IMAGE_FAMILY:-tf-particles/devops/cuda-builder:cuda11.7-cmake3.26}-centos7
    profiles: ["centos7"]
    working_dir: /workspace
    volumes:
      - ${HOST_PROJECT_DIR:-.}:/workspace
      - .:/toolkit
    environment:
      BUILD_PLATFORM: centos7
      CUDA_CXX_PROJECT_DIR: ${CUDA_CXX_PROJECT_DIR:-./examples/cuda-smoke}
      CUDA_CXX_BUILD_ROOT: ${CUDA_CXX_BUILD_ROOT:-./artifacts/cuda-cxx-build}
      CUDA_CXX_INSTALL_ROOT: ${CUDA_CXX_INSTALL_ROOT:-./artifacts/cuda-cxx-install}
      CUDA_CXX_DEPS_ROOT: ${CUDA_CXX_DEPS_ROOT:-./artifacts/deps}
      CUDA_CXX_PLATFORM_DEPS_ROOT: ${CUDA_CXX_DEPS_ROOT:-./artifacts/deps}/centos7
      CUDA_CXX_CMAKE_GENERATOR: ${CUDA_CXX_CMAKE_GENERATOR:-Ninja}
      CUDA_CXX_CMAKE_ARGS: ${CUDA_CXX_CMAKE_ARGS:-}
      CUDA_CXX_BUILD_ARGS: ${CUDA_CXX_BUILD_ARGS:-}
    command:
      - /bin/bash
      - -lc
      - >
        export CHRONO_ROOT="$$CUDA_CXX_PLATFORM_DEPS_ROOT/chrono-install" &&
        export EIGEN3_ROOT="$$CUDA_CXX_PLATFORM_DEPS_ROOT/eigen3-install" &&
        export HDF5_ROOT="$$CUDA_CXX_PLATFORM_DEPS_ROOT/hdf5-install" &&
        export MUPARSERX_ROOT="$$CUDA_CXX_PLATFORM_DEPS_ROOT/muparserx-install" &&
        export OPENMPI_ROOT="$$CUDA_CXX_PLATFORM_DEPS_ROOT/openmpi-install" &&
        export H5ENGINE_SPH_ROOT="$$CUDA_CXX_PLATFORM_DEPS_ROOT/h5engine-sph" &&
        export H5ENGINE_DEM_ROOT="$$CUDA_CXX_PLATFORM_DEPS_ROOT/h5engine-dem" &&
        export CMAKE_PREFIX_PATH="$$CHRONO_ROOT:$$EIGEN3_ROOT:$$HDF5_ROOT:$$MUPARSERX_ROOT:$$OPENMPI_ROOT$${CMAKE_PREFIX_PATH:+:$$CMAKE_PREFIX_PATH}" &&
        export PATH="$$OPENMPI_ROOT/bin:$${PATH}" &&
        export LD_LIBRARY_PATH="$$CHRONO_ROOT/lib:$$HDF5_ROOT/lib:$$MUPARSERX_ROOT/lib:$$OPENMPI_ROOT/lib:$$H5ENGINE_SPH_ROOT/build/h5Engine:$$H5ENGINE_DEM_ROOT/build/h5Engine$${LD_LIBRARY_PATH:+:$$LD_LIBRARY_PATH}" &&
        rm -f "$$CUDA_CXX_BUILD_ROOT/$$BUILD_PLATFORM/CMakeCache.txt" &&
        rm -rf "$$CUDA_CXX_BUILD_ROOT/$$BUILD_PLATFORM/CMakeFiles" &&
        cmake -S "$$CUDA_CXX_PROJECT_DIR" -B "$$CUDA_CXX_BUILD_ROOT/$$BUILD_PLATFORM"
        -G "$$CUDA_CXX_CMAKE_GENERATOR" $$CUDA_CXX_CMAKE_ARGS &&
        cmake --build "$$CUDA_CXX_BUILD_ROOT/$$BUILD_PLATFORM" $$CUDA_CXX_BUILD_ARGS &&
        cmake --install "$$CUDA_CXX_BUILD_ROOT/$$BUILD_PLATFORM" --prefix "$$CUDA_CXX_INSTALL_ROOT/$$BUILD_PLATFORM"

  cuda-cxx-deps-centos7:
    image: ${BUILDER_IMAGE_FAMILY:-tf-particles/devops/cuda-builder:cuda11.7-cmake3.26}-centos7
    profiles: ["centos7"]
    working_dir: /workspace
    volumes:
      - ${HOST_PROJECT_DIR:-.}:/workspace
      - .:/toolkit
    environment:
      BUILD_PLATFORM: centos7
      CUDA_CXX_DEPS_ROOT: ${CUDA_CXX_DEPS_ROOT:-./artifacts/deps}
      CUDA_CXX_PLATFORM_DEPS_ROOT: ${CUDA_CXX_DEPS_ROOT:-./artifacts/deps}/centos7
    command:
      - /bin/bash
      - -lc
      - >
        mkdir -p "$$CUDA_CXX_PLATFORM_DEPS_ROOT" &&
        DEPS_ROOT="$$CUDA_CXX_PLATFORM_DEPS_ROOT" CHRONO_ARCHIVE="/toolkit/docker/cuda-builder/deps/chrono-source.tar.gz" /toolkit/docker/cuda-builder/install-chrono.sh &&
        DEPS_ROOT="$$CUDA_CXX_PLATFORM_DEPS_ROOT" EIGEN3_ARCHIVE="/toolkit/docker/cuda-builder/deps/eigen-3.4.0.tar.gz" /toolkit/docker/cuda-builder/install-eigen3.sh &&
        DEPS_ROOT="$$CUDA_CXX_PLATFORM_DEPS_ROOT" OPENMPI_ARCHIVE="/toolkit/docker/cuda-builder/deps/openmpi-4.1.6.tar.gz" /toolkit/docker/cuda-builder/install-openmpi.sh &&
        DEPS_ROOT="$$CUDA_CXX_PLATFORM_DEPS_ROOT" HDF5_ARCHIVE="/toolkit/docker/cuda-builder/deps/CMake-hdf5-1.14.1-2.tar.gz" /toolkit/docker/cuda-builder/install-hdf5.sh &&
        DEPS_ROOT="$$CUDA_CXX_PLATFORM_DEPS_ROOT" HDF5_INSTALL_PREFIX="$$CUDA_CXX_PLATFORM_DEPS_ROOT/hdf5-install" H5ENGINE_SPH_ARCHIVE="/toolkit/docker/cuda-builder/deps/h5engine-sph.tar.gz" H5ENGINE_DEM_ARCHIVE="/toolkit/docker/cuda-builder/deps/h5engine-dem.tar.gz" /toolkit/docker/cuda-builder/install-h5engine.sh &&
        DEPS_ROOT="$$CUDA_CXX_PLATFORM_DEPS_ROOT" MUPARSERX_ARCHIVE="/toolkit/docker/cuda-builder/deps/muparserx-source.tar.gz" /toolkit/docker/cuda-builder/install-muparserx.sh

