services:
  cuda-cxx-centos7:
    image: ${BUILDER_IMAGE_FAMILY:-registry.example.com/devops/cuda-builder:cuda11.7-cmake3.26}-centos7
    profiles: ["centos7"]
    working_dir: /workspace/project
    volumes:
      - ${CUDA_CXX_PROJECT_DIR:-./examples/cuda-smoke}:/workspace/project
      - ${CUDA_CXX_BUILD_ROOT:-./artifacts/cuda-cxx-build}:/workspace/out
    environment:
      BUILD_PLATFORM: centos7
      CUDA_CXX_CMAKE_GENERATOR: ${CUDA_CXX_CMAKE_GENERATOR:-Ninja}
      CUDA_CXX_CMAKE_ARGS: ${CUDA_CXX_CMAKE_ARGS:-}
      CUDA_CXX_BUILD_ARGS: ${CUDA_CXX_BUILD_ARGS:-}
    command:
      - /bin/bash
      - -lc
      - >
        cmake -S /workspace/project -B /workspace/out/$$BUILD_PLATFORM
        -G "$$CUDA_CXX_CMAKE_GENERATOR" $$CUDA_CXX_CMAKE_ARGS &&
        cmake --build /workspace/out/$$BUILD_PLATFORM $$CUDA_CXX_BUILD_ARGS

  cuda-cxx-rocky8:
