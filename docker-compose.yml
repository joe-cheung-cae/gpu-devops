services:
  cuda-cxx-centos7:
    image: ${BUILDER_IMAGE_FAMILY:-tf-particles/devops/cuda-builder:cuda11.7-cmake3.26}-centos7
    profiles: ["centos7"]
    user: "${CUDA_CXX_RUN_UID}:${CUDA_CXX_RUN_GID}"
    working_dir: /workspace
    volumes:
      - ${HOST_PROJECT_DIR:-.}:/workspace
      - .:/toolkit
    environment:
      BUILD_PLATFORM: centos7
      CUDA_CXX_PROJECT_DIR: ${CUDA_CXX_PROJECT_DIR:-./examples/cuda-smoke}
      CUDA_CXX_BUILD_ROOT: ${CUDA_CXX_BUILD_ROOT:-./artifacts/cuda-cxx-build}
      CUDA_CXX_INSTALL_ROOT: ${CUDA_CXX_INSTALL_ROOT:-./artifacts/cuda-cxx-install}
      CUDA_CXX_DEPS_ROOT: ${CUDA_CXX_DEPS_ROOT:-./artifacts/deps}
      CUDA_CXX_PLATFORM_DEPS_ROOT: ${CUDA_CXX_DEPS_ROOT:-./artifacts/deps}/centos7
      CUDA_CXX_CMAKE_GENERATOR: ${CUDA_CXX_CMAKE_GENERATOR:-Ninja}
      CUDA_CXX_CMAKE_ARGS: ${CUDA_CXX_CMAKE_ARGS:-}
      CUDA_CXX_BUILD_ARGS: ${CUDA_CXX_BUILD_ARGS:-}
      HOME: /tmp/cuda-cxx-home
      CCACHE_DIR: /tmp/cuda-cxx-home/.ccache
    command:
      - /bin/bash
      - -lc
      - >
        mkdir -p "$$CCACHE_DIR" &&
        export CMAKE_PREFIX_PATH="$$CUDA_CXX_PLATFORM_DEPS_ROOT/chrono-install:$$CUDA_CXX_PLATFORM_DEPS_ROOT/eigen3-install:$$CUDA_CXX_PLATFORM_DEPS_ROOT/hdf5-install:$$CUDA_CXX_PLATFORM_DEPS_ROOT/muparserx-install:$$CUDA_CXX_PLATFORM_DEPS_ROOT/openmpi-install$${CMAKE_PREFIX_PATH:+:$$CMAKE_PREFIX_PATH}" &&
        export PATH="$$CUDA_CXX_PLATFORM_DEPS_ROOT/openmpi-install/bin:$${PATH}" &&
        export LD_LIBRARY_PATH="$$CUDA_CXX_PLATFORM_DEPS_ROOT/chrono-install/lib:$$CUDA_CXX_PLATFORM_DEPS_ROOT/hdf5-install/lib:$$CUDA_CXX_PLATFORM_DEPS_ROOT/muparserx-install/lib:$$CUDA_CXX_PLATFORM_DEPS_ROOT/openmpi-install/lib:$$CUDA_CXX_PLATFORM_DEPS_ROOT/h5engine-sph/build/h5Engine:$$CUDA_CXX_PLATFORM_DEPS_ROOT/h5engine-dem/build/h5Engine$${LD_LIBRARY_PATH:+:$$LD_LIBRARY_PATH}" &&
        rm -f "$$CUDA_CXX_BUILD_ROOT/$$BUILD_PLATFORM/CMakeCache.txt" &&
        rm -rf "$$CUDA_CXX_BUILD_ROOT/$$BUILD_PLATFORM/CMakeFiles" &&
        cmake -S "$$CUDA_CXX_PROJECT_DIR" -B "$$CUDA_CXX_BUILD_ROOT/$$BUILD_PLATFORM"
        -G "$$CUDA_CXX_CMAKE_GENERATOR" $$CUDA_CXX_CMAKE_ARGS &&
        cmake --build "$$CUDA_CXX_BUILD_ROOT/$$BUILD_PLATFORM" $$CUDA_CXX_BUILD_ARGS &&
        cmake --install "$$CUDA_CXX_BUILD_ROOT/$$BUILD_PLATFORM" --prefix "$$CUDA_CXX_INSTALL_ROOT/$$BUILD_PLATFORM"

  cuda-cxx-deps-centos7:
    image: ${BUILDER_IMAGE_FAMILY:-tf-particles/devops/cuda-builder:cuda11.7-cmake3.26}-centos7
    profiles: ["centos7"]
    user: "${CUDA_CXX_RUN_UID}:${CUDA_CXX_RUN_GID}"
    working_dir: /workspace
    volumes:
      - ${HOST_PROJECT_DIR:-.}:/workspace
      - .:/toolkit
    environment:
      BUILD_PLATFORM: centos7
      CUDA_CXX_DEPS_ROOT: ${CUDA_CXX_DEPS_ROOT:-./artifacts/deps}
      CUDA_CXX_PLATFORM_DEPS_ROOT: ${CUDA_CXX_DEPS_ROOT:-./artifacts/deps}/centos7
      HOME: /tmp/cuda-cxx-home
      CCACHE_DIR: /tmp/cuda-cxx-home/.ccache
    command:
      - /bin/bash
      - -lc
      - >
        mkdir -p "$$CCACHE_DIR" &&
        mkdir -p "$$CUDA_CXX_PLATFORM_DEPS_ROOT" &&
        DEPS_ROOT="$$CUDA_CXX_PLATFORM_DEPS_ROOT" CHRONO_ARCHIVE="/toolkit/docker/cuda-builder/deps/chrono-source.tar.gz" /bin/bash "/toolkit/docker/cuda-builder/install-chrono.sh" &&
        DEPS_ROOT="$$CUDA_CXX_PLATFORM_DEPS_ROOT" EIGEN3_ARCHIVE="/toolkit/docker/cuda-builder/deps/eigen-3.4.0.tar.gz" /bin/bash "/toolkit/docker/cuda-builder/install-eigen3.sh" &&
        DEPS_ROOT="$$CUDA_CXX_PLATFORM_DEPS_ROOT" OPENMPI_ARCHIVE="/toolkit/docker/cuda-builder/deps/openmpi-4.1.6.tar.gz" /bin/bash "/toolkit/docker/cuda-builder/install-openmpi.sh" &&
        DEPS_ROOT="$$CUDA_CXX_PLATFORM_DEPS_ROOT" HDF5_ARCHIVE="/toolkit/docker/cuda-builder/deps/CMake-hdf5-1.14.1-2.tar.gz" /bin/bash "/toolkit/docker/cuda-builder/install-hdf5.sh" &&
        DEPS_ROOT="$$CUDA_CXX_PLATFORM_DEPS_ROOT" HDF5_INSTALL_PREFIX="$$CUDA_CXX_PLATFORM_DEPS_ROOT/hdf5-install" H5ENGINE_SPH_ARCHIVE="/toolkit/docker/cuda-builder/deps/h5engine-sph.tar.gz" H5ENGINE_DEM_ARCHIVE="/toolkit/docker/cuda-builder/deps/h5engine-dem.tar.gz" /bin/bash "/toolkit/docker/cuda-builder/install-h5engine.sh" &&
        DEPS_ROOT="$$CUDA_CXX_PLATFORM_DEPS_ROOT" MUPARSERX_ARCHIVE="/toolkit/docker/cuda-builder/deps/muparserx-source.tar.gz" /bin/bash "/toolkit/docker/cuda-builder/install-muparserx.sh"

